.lock-box{

}

.lock-icon{
    width:36px;
    height:26px;
    background:#fff;
    border-radius:5px;
    position:relative;
}

  .lock-box p{
    margin-top:6px;
    font-size:13px;
    font-weight:bold;
  }

/* lock handle */
.lock-icon:before{
    content:"";
    position:absolute;

    height:14px;
    border:3px solid #fff;
    border-bottom:none;
    border-radius:12px 12px 0 0;
    top:-12px;

function watchAd(index){

// Monetag ad
if(typeof show_10834801=== "function"){
    show_10834801()
}

let countEl = document.getElementById("count"+index)
let fill = document.getElementById("fill"+index)

let current = parseInt(countEl.innerText)
current++

countEl.innerText = current
fill.style.width = (current/TOTAL_ADS*100)+"%"

if(current >= TOTAL_ADS){
unlockCard(index)

localStorage.setItem("unlock_"+index,"true")
db.ref("users/"+userId+"/unlock/"+index).set(true)
}
}

function unlockCard(index){

document.getElementById("lock"+index).style.display="none"

let btn = document.getElementById("btn"+index)
btn.innerText="Watch Now"
btn.classList.add("unlocked")

document.getElementById("fill"+index).style.width="100%"
document.getElementById("count"+index).innerText=TOTAL_ADS

}
